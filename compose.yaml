services:
  plex-poster-downloader:
    image: ghcr.io/johnfawkes/plex-poster-downloader:latest
    container_name: plex-poster-downloader
    restart: unless-stopped
    # All configuration lives in .env (copy .env.example → .env to get started).
    env_file:
      - .env
    ports:
      - "${FLASK_RUN_PORT:-5000}:${FLASK_RUN_PORT:-5000}"
    volumes:
      # Persist configuration and history
      - ./config:/app/config
      # If using with Kometa, change the left-hand path to the Kometa asset directory
      - ./downloaded_posters:/app/downloaded_posters
